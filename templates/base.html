<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OrderNa Digital Culinary Hub - Browse our fresh Swahili dishes and order directly via WhatsApp or book a table instantly.">
    
    <meta property="og:title" content="OrderNa | Premium Digital Menu Hub">
    <meta property="og:description" content="Explore coastal delicacies, fresh juices, and submit orders smoothly.">
    <meta property="og:type" content="website">
    
    <title>OrderNa | Premium Digital Menu Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-slate-100 font-sans transition-colors duration-200">

    <nav class="bg-white dark:bg-slate-800 border-b border-gray-100 dark:border-slate-700 transition-colors duration-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            
            <div class="flex items-center space-x-3">
                <span class="text-orange-500 font-black text-2xl tracking-tight uppercase">Order<span class="text-gray-900 dark:text-white">Na</span></span>
                <span class="hidden sm:inline-block bg-orange-50 text-orange-600 dark:bg-orange-950/40 dark:text-orange-400 text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-widest border border-orange-200/30">Culinary Hub</span>
            </div>

            <div class="flex items-center space-x-6 text-sm font-bold text-gray-600 dark:text-gray-300">
                <a href="/" class="hover:text-orange-500 transition-colors duration-150">Menu</a>
                <a href="#booking-entry-form" onclick="switchWidgetTab('book')" class="hover:text-orange-500 transition-colors duration-150 bg-gray-50 dark:bg-slate-900/60 px-3 py-1.5 rounded-lg border border-gray-100 dark:border-slate-700">Book a Table</a>
                
                <div class="hidden md:flex items-center space-x-1.5 text-xs text-emerald-600 dark:text-emerald-400">
                    <span class="relative flex h-2 w-2">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <span>Order Dispatch Active</span>
                </div>
            </div>

        </div>
    </div>
</nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-white border-t border-gray-200 mt-auto py-6">
        <div class="text-center text-gray-500 text-sm">
            &copy; 2026 OrderNa - Powered by BizApp Central
        </div>
    </footer>

</body>
</html>
